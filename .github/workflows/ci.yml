name: CI

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/**"
      - ".gitignore"
      - "README.md"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/**"
      - ".gitignore"
      - "README.md"

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
